services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autolabeling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d autolabeling"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  backend:
    image: ghcr.io/somnusochi/vlm-autoyolo-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@db:5432/autolabeling
      PYTHONPATH: /app
    volumes:
      - model-cache:/app/model
      - uploads:/app/uploads
      - training-data:/app/training_runs
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/somnusochi/vlm-autoyolo-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  pgdata:
  model-cache:
  uploads:
  training-data:
