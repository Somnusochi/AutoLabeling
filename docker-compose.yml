version: "3.9"

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: somnusochi
      POSTGRES_PASSWORD: somnusochi
      POSTGRES_DB: locate_anything
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U somnusochi -d locate_anything"]
      interval: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+psycopg2://somnusochi:somnusochi@db:5432/locate_anything
      DEVICE: cpu
    volumes:
      - ./backend:/app
      - model-cache:/app/model
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pgdata:
  model-cache:
